# Codex CLI Configuration for DashScope Coding Plan
# Copy this file to ~/.codex/config.toml

model_provider = "dashscope"
model = "qwen3.5-plus"
model_catalog_json = "~/.codex/models.json"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "disabled"

[model_providers.dashscope]
name = "DashScope Coding Plan (Anthropic)"
base_url = "http://localhost:8765/v1"
api_key = "YOUR_DASHSCOPE_API_KEY_HERE"
requires_openai_auth = false
wire_api = "responses"

[features]
shell_tool = true
multi_agent = true
shell_snapshot = true
request_user_input = true  # Enable interactive questions in planning mode

# ==========================================
# MCP SERVERS (Optional but Recommended)
# ==========================================
# MCP servers extend Codex with additional capabilities
# Each server provides tools that the AI can use

[mcp_servers.tavily]
command = "npx"
args = ["-y", "tavily-mcp@latest"]
enabled = false  # Set to true after adding API key below
startup_timeout_sec = 150
tool_timeout_sec = 150

[mcp_servers.tavily.env]
TAVILY_API_KEY = "YOUR_TAVILY_API_KEY_HERE"  # Get from https://tavily.com

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = false  # Set to true after adding API key below
startup_timeout_sec = 150
tool_timeout_sec = 150

[mcp_servers.context7.env]
CONTEXT7_API_KEY = "YOUR_CONTEXT7_API_KEY_HERE"  # Get from https://context7.com

